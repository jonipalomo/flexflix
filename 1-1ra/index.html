<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consulta de Credenciales - 1ro 1ra</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { min-height: 100vh; background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; }
    .container { width: 100%; max-width: 420px; }
    .header { text-align: center; margin-bottom: 32px; }
    .header h1 { color: #fff; font-size: 1.8rem; font-weight: 700; letter-spacing: -0.5px; }
    .header p { color: rgba(255,255,255,0.5); font-size: 0.9rem; margin-top: 6px; }
    .search-card { background: rgba(255,255,255,0.07); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.12); border-radius: 20px; padding: 32px; }
    .form-group { margin-bottom: 18px; }
    label { display: block; color: rgba(255,255,255,0.7); font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
    input { width: 100%; padding: 14px 18px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 12px; color: #fff; font-size: 1rem; outline: none; transition: all 0.3s ease; }
    input::placeholder { color: rgba(255,255,255,0.3); }
    input:focus { border-color: #7c6aff; background: rgba(124,106,255,0.1); box-shadow: 0 0 0 3px rgba(124,106,255,0.2); }
    button { width: 100%; padding: 15px; background: linear-gradient(135deg, #7c6aff, #a855f7); border: none; border-radius: 12px; color: #fff; font-size: 1rem; font-weight: 700; letter-spacing: 0.5px; cursor: pointer; transition: all 0.3s ease; margin-top: 8px; }
    button:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(124,106,255,0.5); }
    button:active { transform: translateY(0); }
    .result-card { margin-top: 24px; background: rgba(255,255,255,0.05); border: 1px solid rgba(124,106,255,0.4); border-radius: 20px; padding: 28px; display: none; animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    .result-card.show { display: block; }
    .alumno-name { color: #a78bfa; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
    .alumno-fullname { color: #fff; font-size: 1.2rem; font-weight: 700; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .credential-item { margin-bottom: 18px; }
    .credential-label { color: rgba(255,255,255,0.5); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
    .credential-value { display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 12px 16px; }
    .credential-value span { color: #fff; font-size: 0.95rem; font-family: 'Courier New', monospace; letter-spacing: 0.5px; word-break: break-all; }
    .copy-btn { background: none; border: none; color: #7c6aff; cursor: pointer; padding: 4px 8px; border-radius: 6px; transition: all 0.2s; font-size: 0.75rem; font-weight: 700; width: auto; margin-top: 0; flex-shrink: 0; margin-left: 8px; }
    .copy-btn:hover { background: rgba(124,106,255,0.2); transform: none; box-shadow: none; }
    .error-msg { margin-top: 16px; padding: 14px 18px; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); border-radius: 12px; color: #fca5a5; font-size: 0.9rem; text-align: center; display: none; }
    .error-msg.show { display: block; animation: fadeIn 0.3s ease; }
    .badge { display: inline-block; background: rgba(124,106,255,0.2); color: #a78bfa; font-size: 0.7rem; font-weight: 700; padding: 3px 10px; border-radius: 20px; margin-left: 8px; vertical-align: middle; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Portal FutureFab <span class="badge">1ro 1ra</span></h1>
      <p>Ingresá tu DNI y apellido para ver tus credenciales</p>
    </div>
    <div class="search-card">
      <div class="form-group">
        <label>DNI</label>
        <input type="text" id="dniInput" placeholder="Ej: 52520637" maxlength="10" inputmode="numeric">
      </div>
      <div class="form-group">
        <label>Apellido</label>
        <input type="text" id="apellidoInput" placeholder="Ej: Aguilera" maxlength="50">
      </div>
      <button onclick="buscar()">Buscar mis credenciales</button>
      <div class="error-msg" id="errorMsg"></div>
      <div class="result-card" id="resultCard">
        <div class="alumno-name">Alumno</div>
        <div class="alumno-fullname" id="alumnoNombre"></div>
        <div class="credential-item">
          <div class="credential-label">Usuario FF</div>
          <div class="credential-value"><span id="usuarioVal"></span><button class="copy-btn" onclick="copiar('usuarioVal',this)">Copiar</button></div>
        </div>
        <div class="credential-item">
          <div class="credential-label">Contraseña FF</div>
          <div class="credential-value"><span id="passVal"></span><button class="copy-btn" onclick="copiar('passVal',this)">Copiar</button></div>
        </div>
      </div>
    </div>
  </div>
  <script>
    const alumnos = [
      { dni: "52520637", apellido: "Aguilera",  nombre: "Franchesca", usuario: "marioaguilera918@gmail.com",         pass: "fr9590ag" },
      { dni: "52684995", apellido: "Aguilera",  nombre: "Kiara",      usuario: "rodripr6@gmail.com",                 pass: "ki9590ag" },
      { dni: "52684921", apellido: "Bravo",     nombre: "Brenda",     usuario: "brebravo684@gmail.com",             pass: "br9590br" },
      { dni: "52684863", apellido: "Dominguez", nombre: "Julieta",    usuario: "juli17815767@gmail.com",            pass: "ju9590do" },
      { dni: "52520702", apellido: "Frances",   nombre: "Luisana",    usuario: "yasminefrances1409@gmail.com",      pass: "lu9590fr" },
      { dni: "52521252", apellido: "Guajardo",  nombre: "Benicio",    usuario: "benicioguajardo26@gmail.com",       pass: "be9590gu" },
      { dni: "52520636", apellido: "Guardia",   nombre: "Yenien",     usuario: "santiagoojeda710@gmail.com",        pass: "ye9590gu" },
      { dni: "52104967", apellido: "Lucero",    nombre: "Thiago",     usuario: "lalaalpaca.20@gmail.com",           pass: "th9590lu" },
      { dni: "52684967", apellido: "Martinez",  nombre: "Yèsica", usuario: "martinez12yesicad@gmail.com",     pass: "yè9590ma" },
      { dni: "52062369", apellido: "Matias",    nombre: "Luciana",    usuario: "matiawjuan2@gmail.com",             pass: "lu9590ma" },
      { dni: "52520604", apellido: "Moya",      nombre: "Jazmin",     usuario: "moya16934@gmail.com",              pass: "ja9590mo" },
      { dni: "51228894", apellido: "Ortega",    nombre: "Ornella",    usuario: "ortegaornella3@gmail.com",          pass: "or9590or" }
    ];
    function normalizar(s) { return s.trim().toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g, ""); }
    function buscar() {
      const dni = document.getElementById('dniInput').value.trim();
      const ap = normalizar(document.getElementById('apellidoInput').value);
      const err = document.getElementById('errorMsg');
      const card = document.getElementById('resultCard');
      err.className = 'error-msg'; card.className = 'result-card';
      if (!dni || !ap) { err.textContent = 'Por favor completá ambos campos.'; err.className = 'error-msg show'; return; }
      const a = alumnos.find(x => x.dni === dni && normalizar(x.apellido) === ap);
      if (!a) { err.textContent = 'No se encontraron datos. Verificá el DNI y apellido.'; err.className = 'error-msg show'; return; }
      document.getElementById('alumnoNombre').textContent = a.apellido + ', ' + a.nombre;
      document.getElementById('usuarioVal').textContent = a.usuario;
      document.getElementById('passVal').textContent = a.pass;
      card.className = 'result-card show';
    }
    function copiar(id, btn) { navigator.clipboard.writeText(document.getElementById(id).textContent).then(() => { btn.textContent = '¡Copiado!'; setTimeout(() => btn.textContent = 'Copiar', 2000); }); }
    document.addEventListener('keydown', e => { if (e.key === 'Enter') buscar(); });
  </script>
</body>
</html>
