<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consulta de Credenciales - 1ro 2da</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 20px;
    }
    .container { width: 100%; max-width: 420px; }
    .header { text-align: center; margin-bottom: 32px; }
    .header h1 { color: #fff; font-size: 1.8rem; font-weight: 700; letter-spacing: -0.5px; }
    .header p { color: rgba(255,255,255,0.5); font-size: 0.9rem; margin-top: 6px; }
    .search-card {
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 32px;
    }
    .form-group { margin-bottom: 18px; }
    label { display: block; color: rgba(255,255,255,0.7); font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
    input {
      width: 100%; padding: 14px 18px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px; color: #fff; font-size: 1rem; outline: none;
      transition: all 0.3s ease;
    }
    input::placeholder { color: rgba(255,255,255,0.3); }
    input:focus {
      border-color: #7c6aff;
      background: rgba(124,106,255,0.1);
      box-shadow: 0 0 0 3px rgba(124,106,255,0.2);
    }
    button {
      width: 100%; padding: 15px;
      background: linear-gradient(135deg, #7c6aff, #a855f7);
      border: none; border-radius: 12px; color: #fff;
      font-size: 1rem; font-weight: 700; letter-spacing: 0.5px;
      cursor: pointer; transition: all 0.3s ease; margin-top: 8px;
    }
    button:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(124,106,255,0.5); }
    button:active { transform: translateY(0); }
    .result-card {
      margin-top: 24px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(124,106,255,0.4);
      border-radius: 20px; padding: 28px;
      display: none; animation: fadeIn 0.4s ease;
    }
    @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    .result-card.show { display: block; }
    .alumno-name { color: #a78bfa; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
    .alumno-fullname { color: #fff; font-size: 1.2rem; font-weight: 700; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .credential-item { margin-bottom: 18px; }
    .credential-label { color: rgba(255,255,255,0.5); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
    .credential-value {
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px; padding: 12px 16px;
    }
    .credential-value span { color: #fff; font-size: 0.95rem; font-family: 'Courier New', monospace; letter-spacing: 0.5px; word-break: break-all; }
    .copy-btn {
      background: none; border: none; color: #7c6aff;
      cursor: pointer; padding: 4px 8px; border-radius: 6px;
      transition: all 0.2s; font-size: 0.75rem; font-weight: 700;
      width: auto; margin-top: 0; flex-shrink: 0; margin-left: 8px;
    }
    .copy-btn:hover { background: rgba(124,106,255,0.2); transform: none; box-shadow: none; }
    .error-msg {
      margin-top: 16px; padding: 14px 18px;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 12px; color: #fca5a5;
      font-size: 0.9rem; text-align: center; display: none;
    }
    .error-msg.show { display: block; animation: fadeIn 0.3s ease; }
    .badge {
      display: inline-block;
      background: rgba(124,106,255,0.2); color: #a78bfa;
      font-size: 0.7rem; font-weight: 700;
      padding: 3px 10px; border-radius: 20px;
      margin-left: 8px; vertical-align: middle;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Portal FutureFab <span class="badge">1ro 2da</span></h1>
      <p>Ingresá tu DNI y apellido para ver tus credenciales</p>
    </div>
    <div class="search-card">
      <div class="form-group">
        <label>DNI</label>
        <input type="text" id="dniInput" placeholder="Ej: 51015061" maxlength="10" inputmode="numeric">
      </div>
      <div class="form-group">
        <label>Apellido</label>
        <input type="text" id="apellidoInput" placeholder="Ej: Alonso" maxlength="50">
      </div>
      <button onclick="buscar()">Buscar mis credenciales</button>
      <div class="error-msg" id="errorMsg"></div>
      <div class="result-card" id="resultCard">
        <div class="alumno-name">Alumno</div>
        <div class="alumno-fullname" id="alumnoNombre"></div>
        <div class="credential-item">
          <div class="credential-label">Usuario FF</div>
          <div class="credential-value">
            <span id="usuarioVal"></span>
            <button class="copy-btn" onclick="copiar('usuarioVal',this)">Copiar</button>
          </div>
        </div>
        <div class="credential-item">
          <div class="credential-label">Contraseña FF</div>
          <div class="credential-value">
            <span id="passVal"></span>
            <button class="copy-btn" onclick="copiar('passVal',this)">Copiar</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script>
    const alumnos = [
      { dni: "51015061", apellido: "Alonso",     nombre: "Uma",          usuario: "umaalonso51@gmail.com",                  pass: "um9590al" },
      { dni: "52684754", apellido: "Balmaceda",  nombre: "Milagros",      usuario: "nicolbalmaceda21@gmail.com",             pass: "mi9590ba" },
      { dni: "52289939", apellido: "Borsi",       nombre: "Cesar",         usuario: "gabrielborsi680@gmail.com",              pass: "ce9590bo" },
      { dni: "52685058", apellido: "Esposito",    nombre: "Dulce",         usuario: "dulcemiageraldineesposito@gmail.com",    pass: "du9590es" },
      { dni: "51090717", apellido: "Garcia",      nombre: "Zoé",     usuario: "garciamattus@gmail.com",                pass: "zo9590ga" },
      { dni: "52520728", apellido: "Guizzardi",   nombre: "Mauro",         usuario: "guizzardileonel@gmail.com",             pass: "ma9590gu" },
      { dni: "52520884", apellido: "Jurado",      nombre: "Ameli",         usuario: "amelijurado07@gmail.com",               pass: "am9590ju" },
      { dni: "52520841", apellido: "Jurado",      nombre: "Tiago",         usuario: "tiagojurado1244@gmail.com",             pass: "ti9590ju" },
      { dni: "52520752", apellido: "Juri",        nombre: "Kiara",         usuario: "aljukiam50@gmail.com",                  pass: "ki9590ju" },
      { dni: "51091076", apellido: "Martínez", nombre: "Maximiliano", usuario: "martinezmaximilianoandres1@gmail.com",  pass: "ma9590ma" },
      { dni: "52814742", apellido: "Mattus",      nombre: "Joaquin",       usuario: "joaquinmattusaguilera@gmail.com",       pass: "jo9590ma" },
      { dni: "50811686", apellido: "Moyano",      nombre: "Mayra",         usuario: "moyanoalejandro099@gmail.com",          pass: "ma9590mo" },
      { dni: "52244614", apellido: "Niz",         nombre: "Ian",           usuario: "nizian559@gmail.com",                   pass: "ia9590ni" },
      { dni: "51015030", apellido: "Ozán",  nombre: "Dámaris",  usuario: "floresgisel1987@gmail.com",             pass: "da9590oz" },
      { dni: "52814723", apellido: "Paravisini",  nombre: "Tatiana",       usuario: "tatiparavisini@gmail.com",             pass: "ta9590pa" },
      { dni: "52520802", apellido: "Paricagua",   nombre: "Magali",        usuario: "calith.kw4@gmail.com",                  pass: "ma9590pa" },
      { dni: "52684712", apellido: "Sepúlveda", nombre: "Jazmín", usuario: "jazsepulveda34@gmail.com",           pass: "ja9590se" }
    ];
    function normalizar(s) {
      return s.trim().toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g, "");
    }
    function buscar() {
      const dni = document.getElementById('dniInput').value.trim();
      const ap  = normalizar(document.getElementById('apellidoInput').value);
      const err = document.getElementById('errorMsg');
      const card = document.getElementById('resultCard');
      err.className = 'error-msg';
      card.className = 'result-card';
      if (!dni || !ap) {
        err.textContent = 'Por favor completá ambos campos.';
        err.className = 'error-msg show'; return;
      }
      const a = alumnos.find(x => x.dni === dni && normalizar(x.apellido) === ap);
      if (!a) {
        err.textContent = 'No se encontraron datos. Verificá el DNI y apellido.';
        err.className = 'error-msg show'; return;
      }
      document.getElementById('alumnoNombre').textContent = a.apellido + ', ' + a.nombre;
      document.getElementById('usuarioVal').textContent = a.usuario;
      document.getElementById('passVal').textContent = a.pass;
      card.className = 'result-card show';
    }
    function copiar(id, btn) {
      navigator.clipboard.writeText(document.getElementById(id).textContent).then(() => {
        btn.textContent = '¡Copiado!';
        setTimeout(() => btn.textContent = 'Copiar', 2000);
      });
    }
    document.addEventListener('keydown', e => { if (e.key === 'Enter') buscar(); });
  </script>
</body>
</html>
