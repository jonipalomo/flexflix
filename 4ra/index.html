  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 480px;
    }

    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    .header h1 {
      color: #fff;
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .header p {
      color: rgba(255,255,255,0.5);
      font-size: 0.9rem;
      margin-top: 6px;
    }

    .search-card {
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 32px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      color: rgba(255,255,255,0.7);
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      padding: 14px 18px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      color: #fff;
      font-size: 1rem;
      outline: none;
      transition: all 0.3s ease;
    }

    input::placeholder { color: rgba(255,255,255,0.3); }

    input:focus {
      border-color: #7c6aff;
      background: rgba(124, 106, 255, 0.1);
      box-shadow: 0 0 0 3px rgba(124, 106, 255, 0.2);
    }

    button {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #7c6aff, #a855f7);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 8px;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(124, 106, 255, 0.5);
    }

    button:active { transform: translateY(0); }

    .result-section {
      margin-top: 24px;
      display: none;
      animation: fadeIn 0.4s ease;
    }

    .result-section.show { display: block; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .alumno-header {
      color: #a78bfa;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .alumno-fullname {
      color: #fff;
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .credential-block {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(124, 106, 255, 0.3);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 14px;
    }

    .credential-block-title {
      color: rgba(255,255,255,0.4);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 14px;
    }

    .credential-item {
      margin-bottom: 12px;
    }

    .credential-label {
      color: rgba(255,255,255,0.5);
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 5px;
    }

    .credential-value {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 10px 14px;
    }

    .credential-value span {
      color: #fff;
      font-size: 0.88rem;
      font-family: 'Courier New', monospace;
      letter-spacing: 0.3px;
      word-break: break-all;
    }

    .copy-btn {
      background: none;
      border: none;
      color: #7c6aff;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: all 0.2s;
      font-size: 0.72rem;
      font-weight: 700;
      width: auto;
      margin-top: 0;
      flex-shrink: 0;
      margin-left: 8px;
    }

    .copy-btn:hover {
      background: rgba(124, 106, 255, 0.2);
      transform: none;
      box-shadow: none;
    }

    .error-msg {
      margin-top: 16px;
      padding: 14px 18px;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 12px;
      color: #fca5a5;
      font-size: 0.9rem;
      text-align: center;
      display: none;
    }

    .error-msg.show { display: block; animation: fadeIn 0.3s ease; }

    .badge {
      display: inline-block;
      background: rgba(124, 106, 255, 0.2);
      color: #a78bfa;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      margin-left: 8px;
      vertical-align: middle;
    }
  </style>

    function normalizar(str) {
      return str.trim().toLowerCase()
        .normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    }

    function buscar() {
      const dni      = document.getElementById('dniInput').value.trim();
      const apellido = normalizar(document.getElementById('apellidoInput').value);
      const error    = document.getElementById('errorMsg');
      const section  = document.getElementById('resultSection');

      error.className = 'error-msg';
      section.className = 'result-section';

      if (!dni || !apellido) {
        error.textContent = 'Por favor completá ambos campos.';
        error.className = 'error-msg show';
        return;
      }

      // Find all entries matching this DNI
      const matches = alumnos.filter(a => a.dni === dni);

      if (matches.length === 0) {
        error.textContent = 'No se encontraron datos. Verificá el DNI ingresado.';
        error.className = 'error-msg show';
        return;
      }

      // Verify that the apellido matches at least one entry for this DNI
      const apellidoMatch = matches.find(a => normalizar(a.apellido).includes(apellido) || apellido.includes(normalizar(a.apellido).split(' ')[0]));
      if (!apellidoMatch) {
        error.textContent = 'El apellido no coincide con el DNI ingresado.';
        error.className = 'error-msg show';
        return;
      }

      // Show result - use the full name from the longest apellido entry
      const mainEntry = matches.reduce((a, b) => a.apellido.length >= b.apellido.length ? a : b);
      document.getElementById('alumnoNombre').textContent = mainEntry.apellido + ', ' + mainEntry.nombre;

      // Build credential blocks
      const container = document.getElementById('credentialsContainer');
      container.innerHTML = '';

      // Group by email type
      const mendoza = matches.filter(a => a.usuario.includes('@mendoza.edu.ar'));
      const gmail   = matches.filter(a => a.usuario.includes('@gmail.com'));

      if (mendoza.length > 0) {
        container.appendChild(buildBlock('Cuentas @mendoza.edu.ar', mendoza));
      }
      if (gmail.length > 0) {
        container.appendChild(buildBlock('Cuenta @gmail.com', gmail));
      }

      section.className = 'result-section show';
    }

    function buildBlock(title, entries) {
      const block = document.createElement('div');
      block.className = 'credential-block';
      block.innerHTML = `<div class="credential-block-title">${title}</div>`;

      entries.forEach((entry, i) => {
        if (entries.length > 1) {
          const sep = document.createElement('div');
          sep.style.cssText = 'color:rgba(255,255,255,0.3);font-size:0.7rem;margin-bottom:8px;margin-top:' + (i > 0 ? '16px' : '0');
          sep.textContent = entry.nombre;
          block.appendChild(sep);
        }
        block.appendChild(makeCredentialItem('Usuario', entry.usuario));
        block.appendChild(makeCredentialItem('Contraseña', entry.pass));
      });
      return block;
    }

    function makeCredentialItem(label, value) {
      const item = document.createElement('div');
      item.className = 'credential-item';
      const uid = 'cv_' + Math.random().toString(36).slice(2);
      item.innerHTML = `
        <div class="credential-label">${label}</div>
        <div class="credential-value">
          <span id="${uid}">${value}</span>
          <button class="copy-btn" onclick="copiar('${uid}', this)">Copiar</button>
        </div>`;
      return item;
    }

    function copiar(id, btn) {
      const val = document.getElementById(id).textContent;
      navigator.clipboard.writeText(val).then(() => {
        btn.textContent = '¡Copiado!';
        setTimeout(() => btn.textContent = 'Copiar', 2000);
      });
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') buscar();
    });
